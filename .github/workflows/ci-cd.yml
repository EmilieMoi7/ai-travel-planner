name: CI/CD

on:
  push:
    branches:
      - develop
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip check

      - name: Check Python syntax
        run: python -m compileall -q app.py gradio_app.py

      - name: Validate destinations JSON
        run: python -m json.tool data/destinations.json > /dev/null

      - name: Run API tests
        run: pytest -v

  deploy:
    name: Deploy to Hugging Face
    needs: checks

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Hugging Face CLI
        run: pip install --upgrade huggingface_hub

      - name: Upload files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload Emilie7/ai-travel-planner . . \
            --repo-type space \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --token "$HF_TOKEN" \
            --commit-message "Deploy from GitHub Actions"